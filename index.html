<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sistema</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: "Segoe UI", sans-serif; background: #f0f2f5; color: #333; }

    #dashboard { min-height: 100vh; display: flex; flex-direction: column; }

    header {
      background: #1a73e8; color: #fff; padding: 0 24px;
      display: flex; align-items: center; height: 60px;
      box-shadow: 0 2px 8px rgba(0,0,0,.15);
    }
    header .brand { font-size: 1.15rem; font-weight: 700; }

    nav.tabs {
      background: #fff; border-bottom: 2px solid #e0e0e0;
      display: flex; padding: 0 24px; gap: 4px;
    }
    nav.tabs button {
      padding: 14px 18px; border: none; background: none; cursor: pointer;
      font-size: .95rem; color: #666; border-bottom: 3px solid transparent;
      margin-bottom: -2px; transition: color .2s, border-color .2s;
    }
    nav.tabs button.active { color: #1a73e8; border-bottom-color: #1a73e8; font-weight: 600; }
    nav.tabs button:hover:not(.active) { color: #333; }

    .tab-content { display: none; padding: 28px; flex: 1; }
    .tab-content.active { display: block; }

    .card {
      background: #fff; border-radius: 10px; padding: 24px;
      box-shadow: 0 2px 10px rgba(0,0,0,.07); margin-bottom: 20px;
    }
    .card h3 { margin-bottom: 16px; color: #1a73e8; font-size: 1.1rem; }

    .muted { color: #666; line-height: 1.6; }

    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    @media (max-width: 700px) { .row { grid-template-columns: 1fr; } }

    input, select, textarea {
      width: 100%; padding: 11px 13px; border: 1.5px solid #ddd;
      border-radius: 8px; font-size: .97rem; font-family: inherit;
    }
    input:focus, select:focus, textarea:focus { outline: none; border-color: #1a73e8; }
    textarea { resize: vertical; min-height: 90px; }

    label { display: block; margin-bottom: 5px; font-size: .88rem; color: #555; font-weight: 600; }
    .field { margin-bottom: 14px; }

    .btn {
      background: #1a73e8; color: #fff; border: none;
      padding: 11px 24px; border-radius: 8px; cursor: pointer;
      font-size: .97rem; transition: background .2s;
    }
    .btn:hover { background: #1558b0; }
    .btn-danger {
      background: #e53935; color: #fff; border: none;
      padding: 7px 14px; border-radius: 6px; cursor: pointer;
      font-size: .83rem; transition: background .2s;
    }
    .btn-danger:hover { background: #b71c1c; }

    .msg { margin-top: 10px; font-size: .9rem; min-height: 18px; }
    .msg.ok  { color: #198754; }
    .msg.err { color: #e53935; }

    table { width: 100%; border-collapse: collapse; font-size: .93rem; }
    th {
      background: #f5f7fa; color: #555; font-weight: 600;
      padding: 11px 14px; text-align: left; border-bottom: 2px solid #e0e0e0;
    }
    td { padding: 11px 14px; border-bottom: 1px solid #f0f0f0; color: #444; }
    tr:hover td { background: #fafbff; }

    .empty-state { text-align: center; color: #aaa; padding: 30px 0; }
  </style>
</head>
<body>

<div id="dashboard">
  <header>
    <span class="brand">🏢 Sistema</span>
  </header>

  <nav class="tabs">
    <button class="active" onclick="switchTab('home', this)">🏠 Início</button>
    <button onclick="switchTab('cadastro', this)">📝 Cadastro</button>
    <button onclick="switchTab('lista', this)">📋 Lista</button>
  </nav>

  <!-- ── INÍCIO ── -->
  <div class="tab-content active" id="tab-home">
    <div class="card">
      <h3>Bem-vindo ao Sistema</h3>
      <p class="muted">Use as abas acima para navegar.</p>
    </div>
  </div>

  <!-- ── CADASTRO ── -->
  <div class="tab-content" id="tab-cadastro">
    <div class="card">
      <h3>Novo Cadastro</h3>

      <div class="row">
        <div class="field">
          <label>Nome</label>
          <input id="cNome" placeholder="Nome completo" />
        </div>
        <div class="field">
          <label>E-mail</label>
          <input id="cEmail" type="email" placeholder="email@exemplo.com" />
        </div>
      </div>

      <div class="row">
        <div class="field">
          <label>Telefone</label>
          <input id="cTel" placeholder="(00) 00000-0000" />
        </div>
        <div class="field">
          <label>Tipo</label>
          <select id="cTipo">
            <option value="usuario">Usuário</option>
            <option value="colaborador">Colaborador</option>
            <option value="cliente">Cliente</option>
          </select>
        </div>
      </div>

      <div class="field">
        <label>Observação</label>
        <textarea id="cObs" placeholder="Alguma observação..."></textarea>
      </div>

      <button class="btn" onclick="salvarCadastro()">💾 Salvar</button>
      <div class="msg" id="cMsg"></div>
    </div>
  </div>

  <!-- ── LISTA ── -->
  <div class="tab-content" id="tab-lista">
    <div class="card">
      <h3>Registros</h3>
      <div id="listaWrap"></div>
    </div>
  </div>
</div>

<script>
  const LS_KEY = "sys_registros";

  function getRegistros() {
    return JSON.parse(localStorage.getItem(LS_KEY) || "[]");
  }
  function saveRegistros(r) {
    localStorage.setItem(LS_KEY, JSON.stringify(r));
  }

  function switchTab(name, btn) {
    document.querySelectorAll(".tab-content").forEach(t => t.classList.remove("active"));
    document.querySelectorAll("nav.tabs button").forEach(b => b.classList.remove("active"));
    document.getElementById("tab-" + name).classList.add("active");
    if (btn) btn.classList.add("active");
    if (name === "lista") renderLista();
  }

  function salvarCadastro() {
    const nome  = document.getElementById("cNome").value.trim();
    const email = document.getElementById("cEmail").value.trim().toLowerCase();
    const tel   = document.getElementById("cTel").value.trim();
    const tipo  = document.getElementById("cTipo").value;
    const obs   = document.getElementById("cObs").value.trim();
    const msg   = document.getElementById("cMsg");

    msg.className = "msg err";
    if (!nome)  { msg.textContent = "Informe o nome."; return; }
    if (!email) { msg.textContent = "Informe o e-mail."; return; }
    if (!email.includes("@")) { msg.textContent = "E-mail inválido."; return; }

    const registros = getRegistros();
    if (registros.some(r => r.email === email)) {
      msg.textContent = "Este e-mail já está cadastrado."; return;
    }

    registros.push({
      id: Date.now(),
      nome, email, tel, tipo, obs,
      criadoEm: new Date().toISOString()
    });
    saveRegistros(registros);

    msg.className = "msg ok";
    msg.textContent = "✅ Cadastro salvo com sucesso!";

    document.getElementById("cNome").value  = "";
    document.getElementById("cEmail").value = "";
    document.getElementById("cTel").value   = "";
    document.getElementById("cObs").value   = "";
    document.getElementById("cTipo").value  = "usuario";
  }

  function renderLista() {
    const registros = getRegistros();
    const wrap = document.getElementById("listaWrap");

    if (!registros.length) {
      wrap.innerHTML = '<div class="empty-state">Nenhum registro ainda.</div>';
      return;
    }

    let html = `<table>
      <thead><tr>
        <th>Nome</th><th>E-mail</th><th>Telefone</th><th>Tipo</th><th>Data</th><th>Ação</th>
      </tr></thead><tbody>`;

    registros.forEach(r => {
      const data = new Date(r.criadoEm).toLocaleDateString("pt-BR");
      html += `<tr>
        <td>${esc(r.nome)}</td>
        <td>${esc(r.email)}</td>
        <td>${esc(r.tel || "—")}</td>
        <td>${esc(r.tipo)}</td>
        <td>${data}</td>
        <td>
          <button class="btn-danger" onclick="excluir(${r.id})">Excluir</button>
        </td>
      </tr>`;
    });

    wrap.innerHTML = html + "</tbody></table>";
  }

  function excluir(id) {
    if (!confirm("Excluir este registro?")) return;
    saveRegistros(getRegistros().filter(r => r.id !== id));
    renderLista();
  }

  function esc(str) {
    return String(str || "").replace(/[&<>"']/g, s =>
      ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[s])
    );
  }
</script>

</body>
</html>

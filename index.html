<div class="upload-panel">
    <h3>Atualização Diária - Dashboard Junho 2026</h3>
    
    <form id="daily-upload" enctype="multipart/form-data">
        <div class="form-group">
            <label>Data:</label>
            <input type="date" name="date" required>
        </div>
        
        <div class="form-group">
            <label>Arquivo de Dados:</label>
            <input type="file" name="dataFile" accept=".xlsx,.csv" required>
            <small>Formatos aceitos: Excel (.xlsx) ou CSV</small>
        </div>
        
        <button type="submit" class="btn-update">Atualizar Dashboard</button>
    </form>
    
    <div class="status-panel">
        <h4>Status da Atualização:</h4>
        <div id="update-status"></div>
    </div>
</div>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sistema (Acesso por Link)</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: "Segoe UI", sans-serif; background: #f0f2f5; color: #333; }

    #dashboard { min-height: 100vh; display: flex; flex-direction: column; }

    header {
      background: #1a73e8; color: #fff; padding: 0 24px;
      display: flex; align-items: center; justify-content: space-between;
      height: 60px; box-shadow: 0 2px 8px rgba(0,0,0,.15);
    }
    header .brand { font-size: 1.15rem; font-weight: 700; letter-spacing: .3px; }
    header .user-info { font-size: .88rem; display: flex; align-items: center; gap: 14px; }
    header .pill {
      background: rgba(255,255,255,.18);
      border: 1px solid rgba(255,255,255,.35);
      padding: 5px 10px;
      border-radius: 999px;
    }

    nav.tabs {
      background: #fff; border-bottom: 2px solid #e0e0e0;
      display: flex; padding: 0 24px; gap: 4px;
    }
    nav.tabs button {
      padding: 14px 18px; border: none; background: none; cursor: pointer;
      font-size: .95rem; color: #666; border-bottom: 3px solid transparent;
      margin-bottom: -2px; transition: color .2s, border-color .2s;
    }
    nav.tabs button.active { color: #1a73e8; border-bottom-color: #1a73e8; font-weight: 600; }
    nav.tabs button:hover:not(.active) { color: #333; }

    .tab-content { display: none; padding: 28px; flex: 1; }
    .tab-content.active { display: block; }

    .card {
      background: #fff; border-radius: 10px; padding: 24px;
      box-shadow: 0 2px 10px rgba(0,0,0,.07); margin-bottom: 20px;
    }
    .card h3 { margin-bottom: 14px; color: #1a73e8; font-size: 1.1rem; }

    .muted { color: #666; line-height: 1.6; }

    table { width: 100%; border-collapse: collapse; font-size: .93rem; }
    th { background: #f5f7fa; color: #555; font-weight: 600;
         padding: 11px 14px; text-align: left; border-bottom: 2px solid #e0e0e0; }
    td { padding: 11px 14px; border-bottom: 1px solid #f0f0f0; color: #444; }
    tr:hover td { background: #fafbff; }

    .badge {
      display: inline-block; padding: 3px 10px; border-radius: 12px;
      font-size: .78rem; font-weight: 600;
    }
    .badge-pending  { background: #fff3cd; color: #856404; }
    .badge-approved { background: #d1e7dd; color: #155724; }

    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    @media (max-width: 800px) { .row { grid-template-columns: 1fr; } }

    input, select {
      width: 100%; padding: 11px 13px; border: 1.5px solid #ddd;
      border-radius: 8px; font-size: .97rem;
    }
    input:focus, select:focus { outline: none; border-color: #1a73e8; }

    .btn {
      display: inline-block;
      background: #1a73e8; color: #fff; border: none;
      padding: 10px 16px; border-radius: 8px; cursor: pointer;
      font-size: .95rem;
    }
    .btn:hover { background: #1558b0; }

    .btn-approve {
      background: #198754; color: #fff; border: none;
      padding: 6px 12px; border-radius: 6px; cursor: pointer;
      font-size: .83rem;
    }
    .btn-approve:hover { background: #146c43; }
    .btn-del {
      background: #e53935; color: #fff; border: none;
      padding: 6px 12px; border-radius: 6px; cursor: pointer;
      font-size: .83rem; margin-left: 6px;
    }
    .btn-del:hover { background: #b71c1c; }

    .msg { margin-top: 10px; font-size: .9rem; min-height: 18px; }
    .msg.ok { color: #198754; }
    .msg.err { color: #e53935; }

    .empty-state { text-align: center; color: #aaa; padding: 30px 0; font-size: .95rem; }

    code.k { background: #f5f5f5; padding: 2px 6px; border-radius: 6px; }
  </style>
</head>
<body>

<div id="dashboard">
  <header>
    <span class="brand">🏢 Sistema (Link)</span>
    <div class="user-info">
      <span class="pill" id="whoamiPill">Modo: carregando…</span>
    </div>
  </header>

  <nav class="tabs" id="tabsNav">
    <button class="active" onclick="switchTab('home', this)">🏠 Início</button>
    <button onclick="switchTab('request', this)">📝 Novo Cadastro</button>
    <!-- Aba admin é inserida via JS quando admin -->
  </nav>

  <div class="tab-content active" id="tab-home">
    <div class="card">
      <h3>Acesso direto</h3>
      <p class="muted" id="homeText"></p>
      <p class="muted" style="margin-top:10px">
        Link de admin (exemplo): <code class="k">index.html?admin=1</code>
      </p>
    </div>
  </div>

  <div class="tab-content" id="tab-request">
    <div class="card">
      <h3>Solicitar cadastro (sem login)</h3>
      <div class="row">
        <div>
          <label class="muted">Nome</label>
          <input id="reqName" placeholder="Nome completo" />
        </div>
        <div>
          <label class="muted">E-mail</label>
          <input id="reqEmail" placeholder="email@exemplo.com" />
        </div>
      </div>
      <div style="margin-top:14px">
        <label class="muted">Tipo</label>
        <select id="reqType">
          <option value="usuario">Usuário</option>
          <option value="colaborador">Colaborador</option>
        </select>
      </div>
      <div style="margin-top:14px">
        <button class="btn" onclick="submitRequest()">Enviar solicitação</button>
        <div class="msg" id="reqMsg"></div>
      </div>
    </div>
  </div>

  <div class="tab-content" id="tab-admin">
    <div class="card">
      <h3>⏳ Pendentes</h3>
      <div id="pendingTableWrap"></div>
    </div>

    <div class="card">
      <h3>✅ Aprovados</h3>
      <div id="approvedTableWrap"></div>
    </div>
  </div>
</div>

<script>
  const LS_USERS = "sys_users_nologin";

  function getUsers() {
    return JSON.parse(localStorage.getItem(LS_USERS) || "[]");
  }
  function saveUsers(u) {
    localStorage.setItem(LS_USERS, JSON.stringify(u));
  }

  function isAdminByLink() {
    const params = new URLSearchParams(window.location.search);
    return params.get("admin") === "1";
  }

  function switchTab(name, btn) {
    document.querySelectorAll(".tab-content").forEach(t => t.classList.remove("active"));
    document.querySelectorAll("nav.tabs button").forEach(b => b.classList.remove("active"));
    document.getElementById("tab-" + name).classList.add("active");
    if (btn) btn.classList.add("active");
    if (name === "admin") renderAdminTables();
  }

  function ensureAdminTab(isAdmin) {
    const nav = document.getElementById("tabsNav");
    const existing = document.getElementById("tabBtnAdmin");

    if (isAdmin) {
      if (!existing) {
        const btn = document.createElement("button");
        btn.id = "tabBtnAdmin";
        btn.textContent = "🛠 Admin";
        btn.onclick = function(){ switchTab("admin", btn); };
        nav.appendChild(btn);
      }
    } else {
      if (existing) existing.remove();
    }
  }

  function submitRequest() {
    const name = document.getElementById("reqName").value.trim();
    const email = document.getElementById("reqEmail").value.trim().toLowerCase();
    const type = document.getElementById("reqType").value;
    const msg = document.getElementById("reqMsg");

    msg.className = "msg err";
    if (!name) { msg.textContent = "Informe o nome."; return; }
    if (!email) { msg.textContent = "Informe o e-mail."; return; }
    if (!email.includes("@")) { msg.textContent = "E-mail inválido."; return; }

    const users = getUsers();
    if (users.some(u => u.email === email)) {
      msg.textContent = "Este e-mail já está registrado (pendente ou aprovado).";
      return;
    }

    users.push({
      name,
      email,
      type,
      status: "pending",
      createdAt: new Date().toISOString()
    });
    saveUsers(users);

    msg.className = "msg ok";
    msg.textContent = "✅ Solicitação enviada! Aguarde aprovação (admin pelo link).";

    document.getElementById("reqName").value = "";
    document.getElementById("reqEmail").value = "";
    document.getElementById("reqType").value = "usuario";
  }

  function renderAdminTables() {
    if (!isAdminByLink()) return;

    const users = getUsers();
    const pending = users.filter(u => u.status === "pending");
    const approved = users.filter(u => u.status === "approved");

    document.getElementById("pendingTableWrap").innerHTML = buildTable(pending, true);
    document.getElementById("approvedTableWrap").innerHTML = buildTable(approved, false);
  }

  function buildTable(list, isPending) {
    if (!list.length) return '<div class="empty-state">Nenhum registro encontrado.</div>';

    let html = `<table>
      <thead><tr>
        <th>Nome</th><th>E-mail</th><th>Tipo</th><th>Data</th><th>Status</th><th>Ações</th>
      </tr></thead><tbody>`;

    list.forEach(u => {
      const date = u.createdAt ? new Date(u.createdAt).toLocaleDateString("pt-BR") : "—";
      const badge = isPending
        ? '<span class="badge badge-pending">Pendente</span>'
        : '<span class="badge badge-approved">Aprovado</span>';

      const actions = isPending
        ? `<button class="btn-approve" onclick="approveUser('${escapeAttr(u.email)}')">Aprovar</button>
           <button class="btn-del" onclick="deleteUser('${escapeAttr(u.email)}')">Excluir</button>`
        : `<button class="btn-del" onclick="deleteUser('${escapeAttr(u.email)}')">Excluir</button>`;

      html += `<tr>
        <td>${escapeHtml(u.name)}</td>
        <td>${escapeHtml(u.email)}</td>
        <td>${escapeHtml(u.type || "—")}</td>
        <td>${date}</td>
        <td>${badge}</td>
        <td>${actions}</td>
      </tr>`;
    });

    return html + "</tbody></table>";
  }

  function approveUser(email) {
    if (!isAdminByLink()) return;
    const users = getUsers();
    const idx = users.findIndex(u => u.email === email);
    if (idx !== -1) {
      users[idx].status = "approved";
      saveUsers(users);
      renderAdminTables();
    }
  }

  function deleteUser(email) {
    if (!isAdminByLink()) return;
    if (!confirm("Excluir este registro?")) return;
    saveUsers(getUsers().filter(u => u.email !== email));
    renderAdminTables();
  }

  // helpers para evitar quebra/injeção em HTML/atributos
  function escapeHtml(str) {
    return String(str).replace(/[&<>"']/g, s => ({
      "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"
    }[s]));
  }
  function escapeAttr(str) {
    return String(str).replace(/'/g, "\\'");
  }

  (function init() {
    const admin = isAdminByLink();
    document.getElementById("whoamiPill").textContent = admin ? "Modo: ADMIN (por link)" : "Modo: Usuário (por link)";
    document.getElementById("homeText").textContent =
      admin
        ? "Você está em modo admin porque abriu o link com o parâmetro ?admin=1. A aba Admin fica disponível."
        : "Você está acessando sem login e sem senha. Para aprovar cadastros, só abrindo o link de admin.";

    ensureAdminTab(admin);

    // Se o admin entrou, já renderiza as tabelas ao abrir a aba
    if (admin) {
      // opcional: já deixa a aba admin acessível, mas não muda a aba ativa
      renderAdminTables();
    }
  })();
</script>

</body>
</html>
